<svg viewBox="0 0 780 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, sans-serif">

  <!-- Background -->
  <rect width="780" height="540" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="390" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">App Shortcut Navigation Flow</text>

  <!-- ── COLUMN HEADERS ── -->
  <rect x="28" y="54" width="340" height="30" rx="6" fill="#1f6feb" opacity="0.18"/>
  <text x="198" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#58a6ff">Cold Start  (app killed)</text>

  <rect x="412" y="54" width="340" height="30" rx="6" fill="#3fb950" opacity="0.15"/>
  <text x="582" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#3fb950">Warm Start  (app in background)</text>

  <!-- Divider -->
  <line x1="390" y1="54" x2="390" y2="500" stroke="#30363d" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ─── COLD START ─── -->

  <!-- Step 1 -->
  <rect x="60" y="106" width="276" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="198" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">User taps App Shortcut</text>
  <text x="198" y="142" text-anchor="middle" font-size="10" fill="#8b949e">(app is not running)</text>
  <line x1="198" y1="154" x2="198" y2="172" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="60" y="172" width="276" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="198" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">scene:willConnectTo fires</text>
  <text x="198" y="207" text-anchor="middle" font-size="10" fill="#8b949e">NSUserActivity in connectionOptions</text>
  <line x1="198" y1="220" x2="198" y2="238" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="60" y="238" width="276" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="198" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">handleUserActivities()</text>
  <text x="198" y="273" text-anchor="middle" font-size="10" fill="#8b949e">writes action → UserDefaults</text>
  <line x1="198" y1="286" x2="198" y2="304" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="60" y="304" width="276" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="198" y="323" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">Flutter engine starts</text>
  <text x="198" y="339" text-anchor="middle" font-size="10" fill="#8b949e">captureInitialShortcut() → MethodChannel</text>
  <line x1="198" y1="352" x2="198" y2="370" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="60" y="370" width="276" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="198" y="389" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">runApp → initialRoute = '/home'</text>
  <text x="198" y="405" text-anchor="middle" font-size="10" fill="#8b949e">hasShortcutLaunch = true, skip splash</text>
  <line x1="198" y1="418" x2="198" y2="436" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Final cold -->
  <rect x="60" y="436" width="276" height="48" rx="8" fill="#1f6feb"/>
  <text x="198" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">handleInitialShortcut()</text>
  <text x="198" y="473" text-anchor="middle" font-size="11" fill="#cae8ff">→ pushNamed('/search') ✓</text>

  <!-- ─── WARM START ─── -->

  <!-- Step 1 -->
  <rect x="444" y="106" width="276" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="582" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">User taps App Shortcut</text>
  <text x="582" y="142" text-anchor="middle" font-size="10" fill="#8b949e">(app is in the background)</text>
  <line x1="582" y1="154" x2="582" y2="172" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="444" y="172" width="276" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="582" y="191" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">AppIntent.perform() runs</text>
  <text x="582" y="207" text-anchor="middle" font-size="10" fill="#8b949e">UIApplication.shared.open("myapp://…")</text>
  <line x1="582" y1="220" x2="582" y2="238" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="444" y="238" width="276" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="582" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">scene:openURLContexts fires</text>
  <text x="582" y="273" text-anchor="middle" font-size="10" fill="#8b949e">handleURLContexts(URLContexts)</text>
  <line x1="582" y1="286" x2="582" y2="304" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="444" y="304" width="276" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="582" y="323" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">EventChannel emits action</text>
  <text x="582" y="339" text-anchor="middle" font-size="10" fill="#8b949e">startListening() stream receives "search"</text>
  <line x1="582" y1="352" x2="582" y2="436" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>

  <!-- skip label -->
  <text x="596" y="392" font-size="10" fill="#484f58">Flutter already</text>
  <text x="596" y="406" font-size="10" fill="#484f58">running</text>

  <!-- Final warm -->
  <rect x="444" y="436" width="276" height="48" rx="8" fill="#238636"/>
  <text x="582" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ShortcutNavigator.navigate()</text>
  <text x="582" y="473" text-anchor="middle" font-size="11" fill="#aff4b6">→ pushNamed('/search') ✓</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>
    </marker>
  </defs>
</svg>
